<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAI POINTS | 設定</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=1.1">
</head>
<body style="padding-top: 0;">

  <div class="dashboard-container">
    <header class="header">
      <h2 style="margin: 0;">アカウント設定</h2>
      <div class="nav-user">
        <button class="btn btn-outline btn-sm" onclick="goBack()">戻る</button>
        <button class="btn btn-outline btn-sm" onclick="logout()">ログアウト</button>
      </div>
    </header>

    <div class="glass-panel" style="max-width: 600px; margin: 2rem auto;">
      <h3 class="section-title">プロフィール編集</h3>
      
      <form id="settings-form">
        <div class="form-group">
          <label for="settings-name">ユーザー名</label>
          <input type="text" id="settings-name" class="form-control" required>
        </div>
        
        <div class="form-group">
          <label for="settings-email" id="label-settings-email">メールアドレス</label>
          <input type="email" id="settings-email" class="form-control" required>
        </div>
        
        <div class="form-group">
          <label for="settings-password">新しいパスワード (変更のみ入力)</label>
          <input type="password" id="settings-password" class="form-control" placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-primary mt-4">変更を保存</button>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/settings.js"></script>
</body>
</html>
